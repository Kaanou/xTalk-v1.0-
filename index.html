<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <title>xTalk v1.0</title>
  <style>
    :root{--bg:#05070d;--panel:rgba(255,255,255,.04);--panel2:rgba(255,255,255,.06);--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.12);--text:#f4f7ff;--muted:rgba(244,247,255,.56);--accent:#8ae7c6;--accent2:#8aa7ff;--shadow:0 22px 80px rgba(0,0,0,.45);--radius:28px}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;background:radial-gradient(circle at 20% 12%, rgba(138,167,255,.14), transparent 28%),radial-gradient(circle at 80% 0%, rgba(138,231,198,.10), transparent 24%),linear-gradient(180deg,#060810 0%, #05070d 100%);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100%;display:grid;place-items:center;padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom))}
    .app{width:min(1100px,100%);min-height:min(94vh,980px);border:1px solid var(--line);border-radius:calc(var(--radius) + 8px);overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:grid;grid-template-columns:300px 1fr}
    .sidebar{border-right:1px solid var(--line);padding:24px;display:flex;flex-direction:column;gap:18px;background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0))}
    .brand{display:flex;flex-direction:column;gap:10px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg, rgba(138,231,198,.92), rgba(138,167,255,.78));box-shadow:0 10px 30px rgba(138,167,255,.18)}.brand h1{margin:0;font-size:1.8rem;letter-spacing:-.04em;font-weight:650}.brand p{margin:0;color:var(--muted);line-height:1.45;font-size:.94rem;max-width:22ch}
    .nav{display:grid;gap:10px;margin-top:4px}.navbtn{width:100%;border:none;border-radius:16px;padding:14px 16px;font:inherit;cursor:pointer;color:var(--text);background:var(--panel);border:1px solid var(--line);text-align:left}.navbtn.primary{background:linear-gradient(145deg, rgba(138,231,198,.95), rgba(138,167,255,.82));color:#081018;border-color:transparent;font-weight:700}
    .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.chip{padding:8px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:rgba(255,255,255,.76);font-size:.8rem}
    .main{display:flex;flex-direction:column;min-width:0;min-height:0}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 24px;border-bottom:1px solid var(--line)}.status{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.84);font-size:.92rem;min-width:0}.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(138,231,198,.09)}.pill{display:inline-flex;align-items:center;padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:rgba(255,255,255,.82);font-size:.86rem;white-space:nowrap}
    .screen{display:none;min-height:0}.screen.active{display:grid}.home{grid-template-rows:auto auto 1fr;gap:14px;padding:20px 24px}.hero{display:flex;flex-direction:column;gap:8px;max-width:34ch;padding-top:2px}.hero h2{margin:0;font-size:clamp(1.9rem, 3vw, 2.7rem);letter-spacing:-.05em;line-height:1.02}.hero p{margin:0;color:var(--muted);line-height:1.45}.entry{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;max-width:540px}.input{width:100%;border:none;outline:none;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:14px 14px;font:inherit}.btn{border:none;border-radius:16px;padding:14px 16px;font:inherit;cursor:pointer;color:var(--text);background:var(--panel);border:1px solid var(--line)}.btn.primary{background:linear-gradient(145deg, rgba(138,231,198,.95), rgba(138,167,255,.82));color:#081018;border-color:transparent;font-weight:700}.rooms{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:12px;align-content:start;overflow:auto;padding-right:2px}.roomcard{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.03);padding:16px;display:flex;flex-direction:column;gap:8px;min-height:118px}.roomcard .name{font-weight:650;letter-spacing:-.02em}.meta{color:var(--muted);font-size:.84rem;line-height:1.4}.join{margin-top:auto;padding:11px 13px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;font:inherit}.empty{padding:18px;border:1px dashed var(--line);border-radius:20px;color:var(--muted);background:rgba(255,255,255,.02)}.small{color:var(--muted);font-size:.8rem;line-height:1.45}
    .chat{grid-template-rows:auto 1fr auto;min-height:0}.chathead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}.roominfo{display:flex;flex-direction:column;gap:4px;min-width:0}.roominfo strong{font-size:1.02rem;letter-spacing:-.02em}.roominfo span{color:var(--muted);font-size:.84rem}.msgs{overflow:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px;min-height:0;background:radial-gradient(circle at 70% 10%, rgba(138,167,255,.08), transparent 22%),radial-gradient(circle at 10% 90%, rgba(138,231,198,.08), transparent 22%)}.bubble{max-width:min(76%, 480px);padding:14px 16px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.04);line-height:1.45;white-space:pre-wrap;word-break:break-word;box-shadow:0 10px 30px rgba(0,0,0,.14)}.bubble.mine{align-self:flex-end;background:linear-gradient(180deg, rgba(138,231,198,.18), rgba(138,167,255,.12));border-color:rgba(138,231,198,.18)}.bubble.sys{align-self:center;max-width:66%;text-align:center;color:rgba(255,255,255,.68);background:transparent;border-style:dashed}.bubble .sub{display:block;margin-top:6px;color:var(--muted);font-size:.75rem}.composer{padding:16px 18px 18px;border-top:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.04))}.field{display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:22px;padding:12px}textarea{flex:1;resize:none;min-height:26px;max-height:120px;background:transparent;border:none;outline:none;color:var(--text);font:inherit;line-height:1.35;padding:4px 6px}textarea::placeholder{color:rgba(244,247,255,.34)}.send{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(145deg, rgba(138,231,198,.95), rgba(138,167,255,.82));color:#081018;font-weight:800;font-size:1.02rem;flex:0 0 auto}.foot{margin-top:10px;color:rgba(244,247,255,.50);font-size:.8rem}
    .intro{position:fixed;inset:0;background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.10), transparent 18%),linear-gradient(180deg, #04060b 0%, #070a12 100%);display:grid;place-items:center;z-index:99;transition:opacity .45s ease, transform .45s ease}.intro.hide{opacity:0;pointer-events:none;transform:scale(1.02)}.introcard{display:grid;place-items:center;gap:14px;text-align:center;padding:28px 26px}.lock{width:76px;height:76px;border-radius:26px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);display:grid;place-items:center;box-shadow:0 16px 50px rgba(0,0,0,.35);position:relative;overflow:hidden}.lock:before{content:"";position:absolute;inset:-20%;background:conic-gradient(from 180deg, rgba(138,231,198,.0), rgba(138,231,198,.55), rgba(138,167,255,.45), rgba(138,231,198,.0));animation:spin 1.6s linear infinite}.locksvg{position:relative;z-index:1;width:34px;height:34px;opacity:.98}.scan{width:min(240px, 78vw);height:2px;border-radius:999px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}.scan:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, transparent, rgba(138,231,198,.92), transparent);transform:translateX(-100%);animation:scan 1.1s ease-in-out infinite}.intro h2{margin:0;font-size:1.15rem;letter-spacing:.14em;text-transform:uppercase;font-weight:650}.intro p{margin:0;color:rgba(244,247,255,.56);font-size:.9rem;letter-spacing:.08em}.proto{font-size:.76rem;color:rgba(244,247,255,.44);letter-spacing:.22em}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes scan{to{transform:translateX(100%)}}
    @media (max-width:900px){body{padding:12px}.app{grid-template-columns:1fr;min-height:calc(100vh - 24px);border-radius:24px}.sidebar{border-right:none;border-bottom:1px solid var(--line);padding:18px}.home{padding:16px 16px 18px}.entry{grid-template-columns:1fr}.bubble{max-width:88%}}
    @media (prefers-reduced-motion: reduce){.intro,.lock:before,.scan:before,*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="introcard">
      <div class="lock" aria-hidden="true">
        <svg class="locksvg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="10" width="14" height="10" rx="2"></rect>
          <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
        </svg>
      </div>
      <h2>ENCRYPT</h2>
      <div class="scan"></div>
      <p>secure link</p>
      <div class="proto">PROTOCOL 01</div>
    </div>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo"></div><div><h1>xTalk v1.0</h1><p>Discret. Sombre. Épuré.</p></div></div>
      <div class="nav">
        <button class="navbtn primary" id="navHome">Accueil</button>
        <button class="navbtn" id="navChat">Salon</button>
      </div>
      <div class="chiprow"><div class="chip">no login</div><div class="chip">private code</div></div>
      <div class="small">Salon actif uniquement. Rien d’autre.</div>
    </aside>
    <section class="main">
      <div class="topbar"><div class="status"><span class="dot"></span><span id="topStatus">Accueil</span></div><div class="pill" id="ttlPill">TTL —</div></div>
      <div class="screen home active" id="homeView">
        <div class="hero"><h2>Salons en ligne</h2><p>Choisis un salon, ou crée le tien.</p></div>
        <div class="entry"><input id="code" class="input" maxlength="24" placeholder="Code salon" /><button class="btn primary" id="joinBtn">Ouvrir</button></div>
        <div class="rooms" id="rooms"></div>
      </div>
      <div class="screen chat" id="chatView">
        <div class="chathead"><div class="roominfo"><strong id="roomTitle">Salon</strong><span id="roomSub">0 personne</span></div><div class="pill" id="roomTimer">00:00</div></div>
        <div class="msgs" id="msgs"><div class="bubble sys">Salon prêt<span class="sub">xTalk</span></div></div>
        <div class="composer"><div class="field"><textarea id="msg" placeholder="Message…"></textarea><button class="send" id="sendBtn">↑</button></div><div class="foot" id="foot">Accès par code uniquement.</div></div>
      </div>
    </section>
  </div>
  <script>
    const state={rooms:[{code:'ALPHA-9271',name:'Canal Noir',people:2,ttl:3580},{code:'NOVA-1108',name:'Veil',people:1,ttl:1720},{code:'ECHO-7742',name:'Ghost Line',people:2,ttl:611}],room:null,nick:'ghost',timer:null};
    const intro=document.getElementById('intro'),homeView=document.getElementById('homeView'),chatView=document.getElementById('chatView'),roomsEl=document.getElementById('rooms'),msgs=document.getElementById('msgs'),topStatus=document.getElementById('topStatus'),ttlPill=document.getElementById('ttlPill'),roomTitle=document.getElementById('roomTitle'),roomSub=document.getElementById('roomSub'),roomTimer=document.getElementById('roomTimer'),code=document.getElementById('code'),msg=document.getElementById('msg'),foot=document.getElementById('foot');
    function fmt(sec){const m=Math.max(0,Math.floor(sec/60)),s=Math.max(0,sec%60);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
    function setView(view){homeView.classList.toggle('active',view==='home');chatView.classList.toggle('active',view==='chat');topStatus.textContent=view==='home'?'Accueil':(state.room?.name||'Salon');ttlPill.textContent=view==='chat'&&state.room?'TTL '+fmt(state.room.ttl):'TTL —'}
    function renderRooms(){roomsEl.innerHTML='';if(!state.rooms.length){roomsEl.innerHTML='<div class="empty">Aucun salon actif.</div>';return}state.rooms.forEach(room=>{const el=document.createElement('div');el.className='roomcard';el.innerHTML=`<div class="name">${room.name}</div><div class="meta">${room.people} en ligne · ${room.code}</div><button class="join">Rejoindre</button>`;el.querySelector('button').onclick=()=>openRoom(room.code);roomsEl.appendChild(el)})}
    function addBubble(text,mine=false,sub=''){const d=document.createElement('div');d.className='bubble '+(mine?'mine':'sys');d.innerHTML=text.replace(/\\n/g,'<br>')+(sub?`<span class="sub">${sub}</span>`:'');msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight}
    function openRoom(raw){const c=(raw||code.value).trim().toUpperCase();const found=state.rooms.find(r=>r.code===c);if(!found)return;state.room=found;roomTitle.textContent=found.name;roomSub.textContent=found.code+' · '+found.people+' personne'+(found.people>1?'s':'');roomTimer.textContent=fmt(found.ttl);msgs.innerHTML='';addBubble('Salon ouvert',false,'xTalk');setView('chat');clearInterval(state.timer);state.timer=setInterval(()=>{found.ttl=Math.max(0,found.ttl-1);ttlPill.textContent='TTL '+fmt(found.ttl);roomTimer.textContent=fmt(found.ttl);if(found.ttl<=0){clearInterval(state.timer);addBubble('Salon expiré.',false,'system')}},1000)}
    document.getElementById('joinBtn').onclick=()=>openRoom(code.value);document.getElementById('navHome').onclick=()=>setView('home');document.getElementById('navChat').onclick=()=>setView(state.room?'chat':'home');document.getElementById('sendBtn').onclick=()=>{const t=msg.value.trim();if(!t)return;addBubble(t,true,state.nick);msg.value='';msg.focus()};msg.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))document.getElementById('sendBtn').click()});const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;window.setTimeout(()=>intro.classList.add('hide'),reduce?0:1450);renderRooms();setView('home');
  </script>
</body>
</html>
