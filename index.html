<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <title>xTalk v1.0</title>
  <style>
    :root{--bg:#05070d;--panel:rgba(15,18,28,.72);--panel2:rgba(255,255,255,.04);--line:rgba(255,255,255,.08);--text:#f4f7ff;--muted:rgba(244,247,255,.58);--accent:#8ae7c6;--accent2:#8aa7ff;--shadow:0 22px 80px rgba(0,0,0,.45);--radius:28px}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;background:radial-gradient(circle at 20% 12%, rgba(138,167,255,.16), transparent 28%),radial-gradient(circle at 80% 0%, rgba(138,231,198,.12), transparent 24%),linear-gradient(180deg,#060810 0%, #05070d 100%);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100%;display:grid;place-items:center;padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom))}
    .shell{width:min(980px,100%);min-height:min(92vh,980px);background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));border:1px solid var(--line);border-radius:calc(var(--radius) + 8px);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:grid;grid-template-columns:1fr 1.15fr}
    .left{padding:28px;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between;gap:24px;background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0))}
    .mark{display:flex;flex-direction:column;gap:10px}.mark .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg, rgba(138,231,198,.9), rgba(138,167,255,.75));box-shadow:0 10px 30px rgba(138,167,255,.18)}.mark h1{margin:0;font-size:1.9rem;letter-spacing:-.04em;font-weight:650}.mark p{margin:0;color:var(--muted);max-width:24ch;line-height:1.4;font-size:.96rem}
    .mini{display:grid;gap:12px}.chiprow{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:rgba(255,255,255,.78);font-size:.82rem;letter-spacing:.01em}.note{color:var(--muted);font-size:.88rem;line-height:1.45;max-width:28ch}
    .right{display:flex;flex-direction:column;min-height:100%;background:radial-gradient(circle at 70% 10%, rgba(138,167,255,.08), transparent 22%),radial-gradient(circle at 10% 90%, rgba(138,231,198,.08), transparent 22%)}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 18px;gap:12px}.status{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.82);font-size:.92rem}.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(138,231,198,.09)}.ghostbtn{border:none;color:rgba(255,255,255,.78);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:999px;padding:10px 14px;font:inherit;cursor:pointer}
    .feed{flex:1;display:flex;flex-direction:column;gap:12px;padding:0 24px 24px;overflow:auto}.bubble{max-width:min(78%, 420px);padding:14px 16px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.04);line-height:1.45;box-shadow:0 10px 30px rgba(0,0,0,.16);white-space:pre-wrap;word-break:break-word}.me{align-self:flex-end;background:linear-gradient(180deg, rgba(138,231,198,.18), rgba(138,167,255,.12));border-color:rgba(138,231,198,.18)}.sys{align-self:center;color:rgba(255,255,255,.66);background:transparent;border-style:dashed;max-width:66%;text-align:center}
    .composer{padding:18px 18px 20px;border-top:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.04))}.field{display:flex;gap:12px;align-items:flex-end;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:24px;padding:12px}textarea{flex:1;resize:none;border:none;outline:none;background:transparent;color:var(--text);font:inherit;line-height:1.35;min-height:26px;max-height:110px;padding:4px 6px}textarea::placeholder{color:rgba(244,247,255,.35)}.send{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(145deg, rgba(138,231,198,.95), rgba(138,167,255,.82));color:#081018;font-size:1.02rem;font-weight:700;cursor:pointer;flex:0 0 auto}.smallrow{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.fieldline{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.input,select{width:100%;border:none;outline:none;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit}select{appearance:none}.tiny{font-size:.8rem;color:rgba(244,247,255,.52);margin-top:10px;line-height:1.4}
    .intro{position:fixed;inset:0;background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.10), transparent 18%),linear-gradient(180deg, #04060b 0%, #070a12 100%);display:grid;place-items:center;z-index:99;transition:opacity .45s ease, transform .45s ease}.intro.hide{opacity:0;pointer-events:none;transform:scale(1.02)}.intro-card{display:grid;place-items:center;gap:14px;text-align:center;padding:28px 26px}.lock{width:76px;height:76px;border-radius:26px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);display:grid;place-items:center;box-shadow:0 16px 50px rgba(0,0,0,.35);position:relative;overflow:hidden}.lock:before{content:"";position:absolute;inset:-20%;background:conic-gradient(from 180deg, rgba(138,231,198,.0), rgba(138,231,198,.55), rgba(138,167,255,.45), rgba(138,231,198,.0));animation:spin 1.6s linear infinite}.locksvg{position:relative;z-index:1;width:34px;height:34px;opacity:.98}.scan{width:min(240px, 78vw);height:2px;border-radius:999px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}.scan:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, transparent, rgba(138,231,198,.92), transparent);transform:translateX(-100%);animation:scan 1.1s ease-in-out infinite}.intro h2{margin:0;font-size:1.15rem;letter-spacing:.14em;text-transform:uppercase;font-weight:650}.intro p{margin:0;color:rgba(244,247,255,.56);font-size:.9rem;letter-spacing:.08em}.proto{font-size:.76rem;color:rgba(244,247,255,.44);letter-spacing:.22em}
    @keyframes spin{to{transform:rotate(360deg)}} @keyframes scan{to{transform:translateX(100%)}}
    @media (max-width:880px){body{padding:12px}.shell{grid-template-columns:1fr;min-height:calc(100vh - 24px);border-radius:24px}.left{border-right:none;border-bottom:1px solid var(--line);padding:22px}.right{min-height:68vh}.bubble{max-width:86%}.fieldline{grid-template-columns:1fr}}
    @media (prefers-reduced-motion: reduce){.intro,.lock:before,.scan:before{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <div class="intro-card">
      <div class="lock" aria-hidden="true">
        <svg class="locksvg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="10" width="14" height="10" rx="2"></rect>
          <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
        </svg>
      </div>
      <h2>ENCRYPT</h2>
      <div class="scan"></div>
      <p>secure link</p>
      <div class="proto">PROTOCOL 01</div>
    </div>
  </div>

  <div class="shell">
    <section class="left">
      <div class="mark">
        <div class="logo"></div>
        <div>
          <h1>xTalk v1.0</h1>
          <p>Discret. Éphémère. À deux.</p>
        </div>
      </div>

      <div class="mini">
        <div class="fieldline">
          <input id="nick" class="input" maxlength="20" placeholder="Nom" />
          <input id="room" class="input" maxlength="24" placeholder="Salon" />
        </div>
        <div class="fieldline">
          <select id="ttl" class="input">
            <option value="300">5m</option>
            <option value="1800">30m</option>
            <option value="3600" selected>1h</option>
            <option value="21600">6h</option>
          </select>
          <button class="ghostbtn" id="join">Ouvrir</button>
        </div>
        <div class="chiprow">
          <div class="chip">no account</div>
          <div class="chip">burn after</div>
          <div class="chip">E2EE later</div>
        </div>
        <div class="note">Minimal par design. Le but: une sensation fluide, propre, presque invisible.</div>
      </div>

      <div class="note">Capture impossible à garantir sur le web.</div>
    </section>

    <section class="right">
      <div class="topbar">
        <div class="status"><span class="dot"></span><span id="head">Ready</span></div>
        <button class="ghostbtn" id="wipe">Clear</button>
      </div>

      <div class="feed" id="feed">
        <div class="bubble sys">xTalk v1.0</div>
      </div>

      <div class="composer">
        <div class="field">
          <textarea id="msg" placeholder="Message…"></textarea>
          <button class="send" id="send">↑</button>
        </div>
        <div class="tiny" id="foot">Local preview · waits for backend</div>
      </div>
    </section>
  </div>

  <script>
    const intro = document.getElementById('intro');
    const feed = document.getElementById('feed');
    const msg = document.getElementById('msg');
    const nick = document.getElementById('nick');
    const room = document.getElementById('room');
    const ttl = document.getElementById('ttl');
    const head = document.getElementById('head');
    const foot = document.getElementById('foot');

    function add(text, cls='sys'){
      const d = document.createElement('div');
      d.className = 'bubble ' + cls;
      d.textContent = text;
      feed.appendChild(d);
      feed.scrollTop = feed.scrollHeight;
    }

    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const delay = reduce ? 0 : 1450;
    window.setTimeout(() => intro.classList.add('hide'), delay);

    document.getElementById('join').onclick = () => {
      const n = nick.value.trim() || 'ghost';
      const r = room.value.trim() || 'room';
      head.textContent = `${r} · ${n}`;
      foot.textContent = `TTL ${ttl.options[ttl.selectedIndex].textContent}`;
      add(`Opened ${r}`, 'sys');
    };

    document.getElementById('send').onclick = () => {
      const t = msg.value.trim();
      if (!t) return;
      add(t, 'me');
      msg.value = '';
      msg.focus();
    };

    document.getElementById('wipe').onclick = () => {
      feed.innerHTML = '';
      add('Wiped', 'sys');
    };

    msg.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) document.getElementById('send').click();
    });
  </script>
</body>
</html>
